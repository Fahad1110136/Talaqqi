<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talaqqi - Quran Learning</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Talaqqi</h1>
            <div class="nav-links">
                {% if session.user_id %}
                    <span>Welcome, {{ session.username }} ({{ session.user_type }})</span>
                    <a href="{{ url_for('dashboard') }}">Dashboard</a>
                    <a href="{{ url_for('mushaf') }}">Mushaf</a>
                    <!-- ADD THIS LINE FOR TAJWEED ANALYSIS -->
                    <a href="{{ url_for('tajweed_analysis') }}">Tajweed Analysis</a>
                    <a href="{{ url_for('logout') }}">Logout</a>
                    
                {% else %}
                    <a href="{{ url_for('login') }}">Login</a>
                    <a href="{{ url_for('register') }}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
