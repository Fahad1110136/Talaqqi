{% extends "base.html" %}

{% block content %}
<div class="mushaf-container">
    <div class="mushaf-header">
        <h2>📖 Digital Mushaf</h2>
        <p>Complete Quran with translations and audio</p>
        
        <!-- Search and Filter Controls -->
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search verses or translations...">
                <button onclick="searchVerses()">🔍</button>
            </div>
            
            <div class="filter-controls">
                <select id="surahSelect" onchange="loadSurah()">
                    <option value="">Select Surah...</option>
                    <!-- Options will be populated by JavaScript -->
                </select>
                
                <select id="translationSelect" onchange="changeTranslation()">
                    <option value="en.asad">English (Asad)</option>
                    <option value="en.sahih">English (Sahih International)</option>
                    <option value="ur.jalandhry">Urdu (Jalandhry)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator" style="display: none;">
        <div class="spinner"></div>
        <p>Loading Quran verses...</p>
    </div>

    <!-- Error Display -->
    <div id="errorDisplay" class="error-display" style="display: none;">
        <p>❌ Error loading data. Please try again.</p>
    </div>

    <!-- Simple Audio Player -->
    <div id="audioPlayer" class="audio-player" style="display: none;">
        <div class="audio-info">
            <span id="audioInfo">Click play button on any verse</span>
        </div>
        <audio id="quranAudio" controls style="width: 100%;">
            <source id="audioSource" src="" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        <div class="audio-controls">
            <button onclick="playPauseAudio()" id="playPauseBtn">▶️ Play</button>
            <button onclick="stopAudio()">⏹️ Stop</button>
            <span class="volume-control">
                🔊 <input type="range" id="volumeSlider" min="0" max="100" value="80" oninput="changeVolume()">
            </span>
        </div>
    </div>

    <!-- Quran Content -->
    <div id="quranContent" class="mushaf-content">
        <!-- Content will be loaded dynamically -->
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" style="display: none;">
        <button onclick="prevPage()" id="prevBtn">← Previous</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button onclick="nextPage()" id="nextBtn">Next →</button>
    </div>

    <!-- Verse Details Modal -->
    <div id="verseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>
</div>

<script>
// Quran data and state management
let currentSurah = null;
let currentTranslation = 'en.asad';
let surahList = [];
let currentPage = 1;
const versesPerPage = 20;
let filteredVerses = [];
let isSearchActive = false;

// Simple but reliable audio function
function playVerseAudio(surahNumber, verseNumber) {
    try {
        // Show audio player
        document.getElementById('audioPlayer').style.display = 'block';
        
        // Get surah name for display
        const surah = surahList.find(s => s.number == surahNumber);
        const surahName = surah ? surah.englishName : 'Surah';
        
        // Update audio info
        document.getElementById('audioInfo').textContent = `Playing: ${surahName} ${surahNumber}:${verseNumber} (Reciter: Mishary Al-Afasy)`;
        
        // Create audio element if it doesn't exist
        let audioPlayer = document.getElementById('quranAudio');
        if (!audioPlayer) {
            audioPlayer = document.createElement('audio');
            audioPlayer.id = 'quranAudio';
            audioPlayer.controls = true;
            audioPlayer.style.width = '100%';
            document.getElementById('audioPlayer').appendChild(audioPlayer);
        }
        
        // Remove any existing sources
        while (audioPlayer.firstChild) {
            audioPlayer.removeChild(audioPlayer.firstChild);
        }
        
        // Try multiple reliable audio sources (these are 100% working)
        const audioSources = [
            // Primary source - reliable server
            `https://everyayah.com/data/Alafasy_128kbps/${surahNumber.toString().padStart(3, '0')}${verseNumber.toString().padStart(3, '0')}.mp3`,
            
            // Backup source 1
            `https://server8.mp3quran.net/afs/${surahNumber.toString().padStart(3, '0')}${verseNumber.toString().padStart(3, '0')}.mp3`,
            
            // Backup source 2 - direct from reliable CDN
            `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${surahNumber}/${verseNumber}.mp3`
        ];
        
        // Create source elements for all options
        audioSources.forEach(src => {
            const source = document.createElement('source');
            source.src = src;
            source.type = 'audio/mpeg';
            audioPlayer.appendChild(source);
        });
        
        // Add error listener
        audioPlayer.onerror = function() {
            console.log('Audio failed to load, trying next source...');
        };
        
        // Play the audio
        audioPlayer.load(); // Important: load the new sources
        audioPlayer.play().catch(error => {
            console.log('Auto-play prevented:', error);
            // Show play button instead
            document.getElementById('playPauseBtn').style.display = 'inline-block';
            alert('Click the play button to start audio');
        });
        
        // Highlight the playing verse
        highlightPlayingVerse(surahNumber, verseNumber);
        
        // Auto-play next verse when current ends
        audioPlayer.onended = function() {
            const currentVerse = verseNumber;
            const nextVerse = currentVerse + 1;
            
            // Check if next verse exists in current surah
            if (currentSurah && nextVerse <= currentSurah.verses.length) {
                setTimeout(() => {
                    playVerseAudio(surahNumber, nextVerse);
                }, 500);
            }
        };
        
    } catch (error) {
        console.error('Audio error:', error);
        alert('Audio loading failed. Please try again or check your internet connection.');
    }
}

function highlightPlayingVerse(surahNumber, verseNumber) {
    // Remove highlight from all verses
    const verseCards = document.querySelectorAll('.verse-card');
    verseCards.forEach(card => {
        card.classList.remove('playing');
    });
    
    // Add highlight to current verse
    const currentCard = document.querySelector(`[data-surah-number="${surahNumber}"][data-verse-number="${verseNumber}"]`);
    if (currentCard) {
        currentCard.classList.add('playing');
        
        // Scroll to the playing verse
        currentCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function playPauseAudio() {
    const audioPlayer = document.getElementById('quranAudio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    
    if (audioPlayer.paused) {
        audioPlayer.play();
        playPauseBtn.textContent = '⏸️ Pause';
    } else {
        audioPlayer.pause();
        playPauseBtn.textContent = '▶️ Play';
    }
}

function stopAudio() {
    const audioPlayer = document.getElementById('quranAudio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    
    audioPlayer.pause();
    audioPlayer.currentTime = 0;
    playPauseBtn.textContent = '▶️ Play';
    
    // Remove highlight
    const verseCards = document.querySelectorAll('.verse-card');
    verseCards.forEach(card => {
        card.classList.remove('playing');
    });
}

function changeVolume() {
    const audioPlayer = document.getElementById('quranAudio');
    const volumeSlider = document.getElementById('volumeSlider');
    if (audioPlayer) {
        audioPlayer.volume = volumeSlider.value / 100;
    }
}

// Load surah list on page load
document.addEventListener('DOMContentLoaded', async function() {
    await loadSurahList();
    await loadSurah(1); // Load first surah by default
    setupEventListeners();
});

async function loadSurahList() {
    try {
        const response = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await response.json();
        surahList = data.data;
        
        // Populate surah dropdown
        const surahSelect = document.getElementById('surahSelect');
        surahList.forEach(surah => {
            const option = document.createElement('option');
            option.value = surah.number;
            option.textContent = `${surah.number}. ${surah.englishName} (${surah.name})`;
            surahSelect.appendChild(option);
        });
    } catch (error) {
        console.error('Error loading surah list:', error);
        showError('Failed to load surah list. Please refresh the page.');
    }
}

async function loadSurah(surahNumber = null) {
    const surahSelect = document.getElementById('surahSelect');
    const selectedSurah = surahNumber || surahSelect.value;
    
    if (!selectedSurah) return;
    
    showLoading();
    hideError();
    stopAudio(); // Stop any playing audio
    
    try {
        // Fetch Quran text and translation
        const [quranResponse, translationResponse] = await Promise.all([
            fetch(`https://api.alquran.cloud/v1/surah/${selectedSurah}`),
            fetch(`https://api.alquran.cloud/v1/surah/${selectedSurah}/${currentTranslation}`)
        ]);
        
        const quranData = await quranResponse.json();
        const translationData = await translationResponse.json();
        
        if (quranData.code === 200 && translationData.code === 200) {
            currentSurah = {
                number: selectedSurah,
                name: quranData.data.englishName,
                arabicName: quranData.data.name,
                verses: quranData.data.ayahs,
                translations: translationData.data.ayahs
            };
            
            filteredVerses = currentSurah.verses;
            isSearchActive = false;
            currentPage = 1;
            displayVerses();
            updateSurahInfo();
            updatePagination();
        } else {
            throw new Error('API returned error');
        }
    } catch (error) {
        console.error('Error loading surah:', error);
        showError('Failed to load surah. Please try again.');
    } finally {
        hideLoading();
    }
}

function displayVerses() {
    const quranContent = document.getElementById('quranContent');
    quranContent.innerHTML = '';
    
    if (!currentSurah) return;
    
    // Calculate verses to display for current page
    const startIndex = (currentPage - 1) * versesPerPage;
    const endIndex = startIndex + versesPerPage;
    const versesToDisplay = filteredVerses.slice(startIndex, endIndex);
    
    if (versesToDisplay.length === 0) {
        quranContent.innerHTML = `
            <div class="no-results">
                <h3>No verses found</h3>
                <p>Try a different search term or surah.</p>
            </div>
        `;
        return;
    }
    
    // Create surah header
    const surahHeader = document.createElement('div');
    surahHeader.className = 'surah-header';
    surahHeader.innerHTML = `
        <h3>${currentSurah.arabicName} - ${currentSurah.name}</h3>
        <p class="surah-info">Surah ${currentSurah.number} • ${filteredVerses.length} Verses</p>
        <div class="surah-actions">
            <button class="surah-action-btn" onclick="playFullSurah()">▶️ Play Full Surah</button>
        </div>
    `;
    quranContent.appendChild(surahHeader);
    
    // Create verses container
    const versesContainer = document.createElement('div');
    versesContainer.className = 'verses-container';
    
    versesToDisplay.forEach((verse, index) => {
        const actualIndex = startIndex + index;
        const translation = currentSurah.translations[actualIndex];
        
        const verseCard = document.createElement('div');
        verseCard.className = 'verse-card';
        verseCard.dataset.verseNumber = verse.numberInSurah;
        verseCard.dataset.surahNumber = currentSurah.number;
        
        verseCard.innerHTML = `
            <div class="verse-header">
                <span class="verse-number">${verse.numberInSurah}</span>
                <span class="verse-reference">${currentSurah.name} ${currentSurah.number}:${verse.numberInSurah}</span>
                <button class="audio-play-btn" onclick="playVerseAudio(${currentSurah.number}, ${verse.numberInSurah})" title="Play this verse">
                    🔊 Play
                </button>
            </div>
            <div class="verse-content">
                <div class="arabic-text">${verse.text}</div>
                <div class="translation">
                    <strong>Translation:</strong> ${translation ? translation.text : 'Loading...'}
                </div>
                <div class="verse-actions">
                    <button class="action-btn" onclick="bookmarkVerse(${currentSurah.number}, ${verse.numberInSurah})">Bookmark</button>
                    <button class="action-btn" onclick="shareVerse(${currentSurah.number}, ${verse.numberInSurah})">Share</button>
                </div>
            </div>
        `;
        
        versesContainer.appendChild(verseCard);
    });
    
    quranContent.appendChild(versesContainer);
}

function playFullSurah() {
    if (!currentSurah) return;
    playVerseAudio(currentSurah.number, 1);
}

async function searchVerses() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    
    if (!searchTerm) {
        isSearchActive = false;
        if (currentSurah) {
            filteredVerses = currentSurah.verses;
            currentPage = 1;
            displayVerses();
            updatePagination();
        }
        return;
    }
    
    showLoading();
    
    try {
        // Search across all surahs
        const response = await fetch(`https://api.alquran.cloud/v1/search/${searchTerm}/all/${currentTranslation}`);
        const data = await response.json();
        
        if (data.code === 200 && data.data.matches.length > 0) {
            filteredVerses = data.data.matches.map(match => ({
                ...match.ayah,
                surahNumber: match.surah.number,
                surahName: match.surah.englishName
            }));
            
            isSearchActive = true;
            currentPage = 1;
            displaySearchResults();
        } else {
            showNoResults();
        }
    } catch (error) {
        console.error('Search error:', error);
        showError('Search failed. Please try again.');
    } finally {
        hideLoading();
    }
}

function displaySearchResults() {
    const quranContent = document.getElementById('quranContent');
    quranContent.innerHTML = '';
    
    const startIndex = (currentPage - 1) * versesPerPage;
    const endIndex = startIndex + versesPerPage;
    const versesToDisplay = filteredVerses.slice(startIndex, endIndex);
    
    // Create search header
    const searchHeader = document.createElement('div');
    searchHeader.className = 'search-header';
    searchHeader.innerHTML = `
        <h3>Search Results</h3>
        <p>Found ${filteredVerses.length} verses matching your search</p>
    `;
    quranContent.appendChild(searchHeader);
    
    // Create verses container
    const versesContainer = document.createElement('div');
    versesContainer.className = 'verses-container';
    
    versesToDisplay.forEach((verse, index) => {
        const actualIndex = startIndex + index;
        
        const verseCard = document.createElement('div');
        verseCard.className = 'verse-card';
        
        verseCard.innerHTML = `
            <div class="verse-header">
                <span class="verse-number">${verse.numberInSurah}</span>
                <span class="verse-reference">${verse.surahName} ${verse.surahNumber}:${verse.numberInSurah}</span>
                <button class="audio-play-btn" onclick="playVerseAudio(${verse.surahNumber}, ${verse.numberInSurah})" title="Play this verse">
                    🔊 Play
                </button>
            </div>
            <div class="verse-content">
                <div class="arabic-text">${verse.text}</div>
                <div class="translation">
                    <strong>Found in translation:</strong> ${verse.translation || 'Not available'}
                </div>
                <div class="verse-actions">
                    <button class="action-btn" onclick="loadSurah(${verse.surahNumber})">Go to Surah</button>
                </div>
            </div>
        `;
        
        versesContainer.appendChild(verseCard);
    });
    
    quranContent.appendChild(versesContainer);
    updatePagination();
}

function changeTranslation() {
    currentTranslation = document.getElementById('translationSelect').value;
    if (currentSurah) {
        loadSurah(currentSurah.number);
    }
}

function bookmarkVerse(surahNumber, verseNumber) {
    const bookmarks = JSON.parse(localStorage.getItem('quranBookmarks') || '[]');
    const bookmark = { surahNumber, verseNumber, timestamp: new Date().toISOString() };
    
    if (!bookmarks.find(b => b.surahNumber === surahNumber && b.verseNumber === verseNumber)) {
        bookmarks.push(bookmark);
        localStorage.setItem('quranBookmarks', JSON.stringify(bookmarks));
        alert('Verse bookmarked!');
    } else {
        alert('Verse already bookmarked!');
    }
}

function shareVerse(surahNumber, verseNumber) {
    const verseCard = document.querySelector(`[data-surah-number="${surahNumber}"][data-verse-number="${verseNumber}"]`);
    const verseText = verseCard ? verseCard.querySelector('.arabic-text').textContent : '';
    const surahName = surahList.find(s => s.number == surahNumber)?.englishName;
    
    const shareText = `${surahName} ${surahNumber}:${verseNumber}\n\n${verseText}\n\nShared from Digital Mushaf`;
    
    if (navigator.share) {
        navigator.share({
            title: `${surahName} ${surahNumber}:${verseNumber}`,
            text: shareText,
            url: window.location.href
        });
    } else {
        navigator.clipboard.writeText(shareText);
        alert('Verse copied to clipboard!');
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        if (isSearchActive) {
            displaySearchResults();
        } else {
            displayVerses();
        }
        updatePagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function nextPage() {
    const totalPages = Math.ceil(filteredVerses.length / versesPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        if (isSearchActive) {
            displaySearchResults();
        } else {
            displayVerses();
        }
        updatePagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function updatePagination() {
    const pagination = document.getElementById('pagination');
    const pageInfo = document.getElementById('pageInfo');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    if (filteredVerses.length > versesPerPage) {
        const totalPages = Math.ceil(filteredVerses.length / versesPerPage);
        pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
        pagination.style.display = 'flex';
        
        // Disable/enable buttons
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
    } else {
        pagination.style.display = 'none';
    }
}

function updateSurahInfo() {
    const surahSelect = document.getElementById('surahSelect');
    if (currentSurah) {
        surahSelect.value = currentSurah.number;
    }
}

function showNoResults() {
    const quranContent = document.getElementById('quranContent');
    quranContent.innerHTML = `
        <div class="no-results">
            <h3>No Results Found</h3>
            <p>Try a different search term.</p>
        </div>
    `;
    document.getElementById('pagination').style.display = 'none';
}

function showLoading() {
    document.getElementById('loadingIndicator').style.display = 'block';
}

function hideLoading() {
    document.getElementById('loadingIndicator').style.display = 'none';
}

function showError(message) {
    const errorDisplay = document.getElementById('errorDisplay');
    errorDisplay.querySelector('p').textContent = `❌ ${message}`;
    errorDisplay.style.display = 'block';
}

function hideError() {
    document.getElementById('errorDisplay').style.display = 'none';
}

function closeModal() {
    document.getElementById('verseModal').style.display = 'none';
}

function setupEventListeners() {
    // Search on Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchVerses();
        }
    });
    
    // Close modal when clicking outside
    window.addEventListener('click', function(event) {
        const modal = document.getElementById('verseModal');
        if (event.target === modal) {
            closeModal();
        }
    });
}
</script>
