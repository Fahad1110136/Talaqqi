<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: #0d1117;
            color: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background-color: #161b22;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 20px;
            color: #10B981;
        }

        .sidebar a {
            display: block;
            color: #ccc;
            text-decoration: none;
            padding: 10px 0;
            margin: 6px 0;
        }

        .sidebar a:hover {
            color: #10B981;
        }

        /* MAIN AREA */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            height: 60px;
            background-color: #161b22;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 20px;
            color: #10B981;
        }

        /* DASHBOARD CONTENT */
        .content {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* CARDS */
        .card {
            background-color: #1e2530;
            padding: 20px;
            border-radius: 10px;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0px 10px 25px rgba(255, 255, 255, 0.1);
        }

        .card h3 {
            color: #10B981;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="#">Home</a>
        <a href="#">Analytics</a>
        <a href="#">Users</a>
        <a href="#">Settings</a>
    </div>

    <!-- MAIN AREA -->
    <div class="main">

        <!-- NAVBAR -->
        <div class="navbar">
            My Dashboard
        </div>

        <!-- MAIN CONTENT (CARDS) -->
        <div class="content">
            <div class="card">
                <h3>Total Users</h3>
                <p>1,240</p>
            </div>

            <div class="card">
                <h3>Sales</h3>
                <p>$8,350</p>
            </div>

            <div class="card">
                <h3>New Orders</h3>
                <p>52</p>
            </div>

            <div class="card">
                <h3>Messages</h3>
                <p>17</p>
            </div>
        </div>

    </div>

</body>
</html>
