<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - Talaqqi</title>
    <link rel="stylesheet" href="authentication.css">
</head>

<body>

    <header class="header">
        <h1>Talaqqi</h1>
        <nav class="nav">
            <a href="homePage.html">Homepage</a>
            <a href="authentication.html">Authentication</a>
        </nav>
    </header>

    <main class="main">
        <div class="card">
            <h2>User Registration</h2>

            <form action="#" method="post" class="formCon">

                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>

                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter email" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <div class="field">
                    <label for="CfrmPassword">Confirm Password</label>
                    <input type="password" id="CfrmPassword" name="CfrmPassword" placeholder="Confirm password" required>
                </div>

                <button type="submit" class="submitBtn">Register</button>

            </form>
        </div>
    </main>

    <footer class="footer">
        &copy; 2025 Talaqqi. All rights reserved.
    </footer>

</body>

</html>
